<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html" xmlns:th="http://www.thymeleaf.org">
<head><title>Bulk Role Assignment Audit</title></head>
<body>
<p>Hello,</p>

<p>
    A bulk role assignment has been performed in HelloDATA business domain
    <span th:text="${#objects.nullSafe(BUSINESS_DOMAIN_NAME, '_Unknown_')}"/> by
    <strong><span th:text="${#objects.nullSafe(PERFORMED_BY, '_Unknown_')}"/></strong>.
</p>

<h3>Summary</h3>
<ul>
    <li>Updated: <span th:text="${UPDATED_COUNT}"/></li>
    <li>Skipped: <span th:text="${SKIPPED_COUNT}"/></li>
    <li>Failed: <span th:text="${FAILED_COUNT}"/></li>
</ul>

<h3>Domain Assignments</h3>
<ul>
    <li th:each="assignment : ${DOMAIN_ASSIGNMENTS}">
        <span th:text="${assignment}"/>
    </li>
</ul>

<div th:if="${!UPDATED_USERS.isEmpty()}">
    <h3>Updated Users</h3>
    <table border="1" style="border-collapse: collapse; padding: 5px;">
        <tr><th>Name</th><th>Email</th></tr>
        <tr th:each="user : ${UPDATED_USERS}">
            <td th:text="${user.firstName + ' ' + user.lastName}"/><td th:text="${user.email}"/>
        </tr>
    </table>
</div>

<div th:if="${!SKIPPED_USERS.isEmpty()}">
    <h3>Skipped Users</h3>
    <table border="1" style="border-collapse: collapse; padding: 5px;">
        <tr><th>Name</th><th>Email</th><th>Reason</th></tr>
        <tr th:each="user : ${SKIPPED_USERS}">
            <td th:text="${user.firstName + ' ' + user.lastName}"/><td th:text="${user.email}"/><td th:text="${user.reason}"/>
        </tr>
    </table>
</div>

<div th:if="${!FAILED_USERS.isEmpty()}">
    <h3>Failed Users</h3>
    <table border="1" style="border-collapse: collapse; padding: 5px;">
        <tr><th>Name</th><th>Email</th><th>Reason</th></tr>
        <tr th:each="user : ${FAILED_USERS}">
            <td th:text="${user.firstName + ' ' + user.lastName}"/><td th:text="${user.email}"/><td th:text="${user.reason}"/>
        </tr>
    </table>
</div>

<p>Link to Business Domain
    <a th:href="${#objects.nullSafe(link, '_Unknown_')}"><span
            th:text="${#objects.nullSafe(BUSINESS_DOMAIN_NAME, '_Unknown_')}"/></a>
</p>

<p>Kind regards<br/>HelloDATA</p>

</body>
</html>
