<p-table [paginator]="true"
         [rowHover]="true"
         [rows]="5"
         [showCurrentPageReport]="true"
         [tableStyle]="{ 'min-width': '20rem' }"
         [value]="dataMarts$ | async"
         [stripedRows]="true"
         dataKey="id">
  <ng-template pTemplate="caption">
    <div class="flex items-center">
      <h5 class="m-0">{{ title() }}</h5>
    </div>
  </ng-template>
  <ng-template pTemplate="header">
    <tr>
      <th id="iconHeader"></th>
      <th id="dataDomain" pSortableColumn="domain" [pTooltip]="'@Data domain' | transloco"
          tooltipPosition="top">{{ '@Data domain' | transloco }}
        <p-sortIcon field="domain"/>
      </th>
      <th id="name" pSortableColumn="name">{{ '@Data Mart' | transloco }}
        <p-sortIcon field="name"/>
      </th>
    </tr>
  </ng-template>
  <ng-template let-datamart pTemplate="body">
    <tr class="cursor-pointer" (click)="onRowNavigate()" (keydown.enter)="onRowNavigate()">
      <td>
        <i class="fas fa-light fa-store"></i>
      </td>
      <td [pTooltip]="datamart.label" tooltipPosition="top">
        {{ datamart.label }}
      </td>
      <td>
        {{ '@DM Viewer' | transloco }}
      </td>
    </tr>
  </ng-template>
</p-table>
