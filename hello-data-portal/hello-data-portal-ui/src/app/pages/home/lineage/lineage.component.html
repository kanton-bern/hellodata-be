@if ((this.docs$ |async); as lineageDocs) {
  <div>
    <p-table [paginator]="true"
             [stripedRows]="true"
             [rowHover]="true"
             [rows]="5"
             [showCurrentPageReport]="true"
             [tableStyle]="{ 'min-width': '20rem' }"
             [value]="lineageDocs"
             dataKey="displayName">
      <ng-template pTemplate="caption">
        <div class="flex items-center">
          <h5 class="m-0">{{ title() }}</h5>
        </div>
      </ng-template>
      <ng-template pTemplate="header">
        <tr>
          <th id="icon"></th>
          <th id="dataDomain" pSortableColumn="name" [pTooltip]="'@Data domain' | transloco"
              tooltipPosition="top">{{ '@Data domain' | transloco }}
            <p-sortIcon field="name"/>
          </th>
          <th id="name" pSortableColumn="name">{{ '@Docs' | transloco }}
            <p-sortIcon field="name"/>
          </th>
        </tr>
      </ng-template>
      <ng-template let-projectDoc pTemplate="body">
        <tr class="cursor-pointer" (click)="onRowNavigate(projectDoc)" (keydown.enter)="onRowNavigate(projectDoc)">
          <td>
            <i class="fas fa-light fa-diagram-project"></i>
          </td>
          <td [pTooltip]="projectDoc.contextName" tooltipPosition="top">
            {{ projectDoc.contextName }}
          </td>
          <td>
            {{ projectDoc.name }}
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
}
