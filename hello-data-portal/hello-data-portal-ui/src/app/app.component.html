@if (showFirstLoginOverlay) {
  <div class="first-login-overlay" [class.fade-out]="overlayFadingOut">
    <div class="first-login-content">
      <div class="card-stack">
        <div class="card card-1"><img src="assets/img/hellodata-logo.png" alt=""/></div>
        <div class="card card-2"><img src="assets/img/hellodata-logo.png" alt=""/></div>
        <div class="card card-3"><img src="assets/img/hellodata-logo.png" alt=""/></div>
        <div class="card card-4"><img src="assets/img/hellodata-logo.png" alt=""/></div>
        <div class="card card-5"><img src="assets/img/hellodata-logo.png" alt=""/></div>
      </div>
      <p class="first-login-text">{{ '@Preparing your workspace' | transloco }}</p>
    </div>
  </div>
}

<ng-container>
  @if ((isMobile$ | async) === false) {
    <app-side-nav-outer-toolbar title="{{appInfo.title}}">
      <router-outlet/>
    </app-side-nav-outer-toolbar>
  }
  @if (isMobile$ | async) {
    <app-mobile>
      <router-outlet/>
    </app-mobile>
  }
</ng-container>

<!-- subscriptions kept for side effects (title update, redirect handling) -->
@if ((businessDomain$ | async)) {
  <div style="display: none"></div>
}
@if ((redirectTo$ | async)) {
}
