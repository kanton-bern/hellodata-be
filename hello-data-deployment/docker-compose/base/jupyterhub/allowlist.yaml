# HelloDATA JupyterHub Package Allowlist
#
# Only packages listed here can be installed via pip in JupyterHub notebooks.
# Version specifiers follow PEP 440: https://peps.python.org/pep-0440/
#
# Examples:
#   pandas: "*"           # any version
#   pandas: ">=2.0,<3.0"  # version range
#   pandas: "==2.2.3"     # exact version
#
# Changes are hot-reloaded — no proxy restart required.

packages:
  # --- Pre-installed in notebook image (keep in sync with Dockerfile.base_notebook) ---
  psycopg2-binary: "*"
  jupyterlab-language-pack-de-de: "*"
  jupyterlab-language-pack-fr-fr: "*"

  # --- Data processing ---
  pandas: ">=2.0,<3.0"
  numpy: ">=1.26,<3.0"
  openpyxl: "*"
  xlrd: "*"

  # --- Database ---
  sqlalchemy: ">=2.0,<3.0"

  # --- Visualization ---
  matplotlib: ">=3.8,<4.0"
  seaborn: ">=0.13,<1.0"
  plotly: ">=5.0,<7.0"

  # --- Machine Learning ---
  scikit-learn: ">=1.4,<2.0"

  # --- HTTP / API ---
  requests: ">=2.31,<3.0"

  # --- Utilities ---
  python-dotenv: "*"
  tqdm: "*"
